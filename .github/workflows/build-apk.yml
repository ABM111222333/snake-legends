name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.33

    - name: Create buildozer.spec (with NDK 25c)
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Snake Legends
        package.name = snakelegends
        package.domain = org.snakelegends
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,txt
        version = 0.1
        requirements = python3,pygame,random,math,collections
        orientation = portrait
        fullscreen = 1
        android.permissions = INTERNET
        android.api = 30
        android.minapi = 21
        android.sdk = 30
        android.ndk = 25c
        android.accept_sdk_license = True
        android.arch = armeabi-v7a
        android.allow_backup = True
        ios.codesign.debug = False
        EOF

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: snake-legends-apk
        path: bin/*.apk
