name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        
    - name: Install Buildozer
      run: |
        pip install buildozer cython==0.29.33
        
    - name: Create buildozer.spec
      run: |
        buildozer init
        sed -i 's/^requirements = python3,kivy/requirements = python3,pygame,random,math,collections/' buildozer.spec
        sed -i 's/^package.name = .*/package.name = snakelegends/' buildozer.spec
        sed -i 's/^package.domain = .*/package.domain = com.snakelegends/' buildozer.spec
        sed -i 's/^fullscreen = 0/fullscreen = 1/' buildozer.spec
        
    - name: Build APK
      run: |
        buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: snake-legends-apk
        path: bin/*.apk
